<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="12" fill="#ffffff"/>
  <!-- Owl body -->
  <ellipse cx="50" cy="58" rx="24" ry="28" fill="#E8820C"/>
  <!-- Ear tufts -->
  <polygon points="32,35 28,18 40,30" fill="#8B3A0F"/>
  <polygon points="68,35 72,18 60,30" fill="#8B3A0F"/>
  <!-- Face -->
  <ellipse cx="50" cy="50" rx="22" ry="20" fill="#E8820C"/>
  <!-- Eye whites -->
  <circle cx="41" cy="47" r="10" fill="#f5e6d0"/>
  <circle cx="59" cy="47" r="10" fill="#f5e6d0"/>
  <!-- Pupils -->
  <circle cx="41" cy="47" r="6" fill="#4a2800"/>
  <circle cx="59" cy="47" r="6" fill="#4a2800"/>
  <!-- Eye shine -->
  <circle cx="43" cy="45" r="2" fill="white"/>
  <circle cx="61" cy="45" r="2" fill="white"/>
  <!-- Glasses bridge -->
  <line x1="51" y1="47" x2="49" y2="47" stroke="#3a3a5c" stroke-width="2"/>
  <!-- Glasses frames -->
  <circle cx="41" cy="47" r="10" fill="none" stroke="#3a3a5c" stroke-width="2"/>
  <circle cx="59" cy="47" r="10" fill="none" stroke="#3a3a5c" stroke-width="2"/>
  <!-- Beak -->
  <polygon points="50,56 46,62 54,62" fill="#e67e00"/>
  <!-- Chest -->
  <ellipse cx="50" cy="74" rx="14" ry="10" fill="#f5e6d0"/>
</svg>
